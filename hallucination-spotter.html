<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hallucination Spotter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Manrope:wght@400;600;700;800&display=swap');

  :root {
    --bg: #f5f2eb;
    --surface: #fff;
    --border: #e0dbd0;
    --text: #1a1714;
    --muted: #9a9285;
    --red: #c0392b;
    --orange: #d35400;
    --yellow: #b8860b;
    --green: #27ae60;
    --red-light: #fdf0ee;
    --orange-light: #fdf4ee;
    --yellow-light: #fdfbee;
    --green-light: #eefdf3;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    min-height: 100vh;
    padding: 2rem;
  }

  header {
    max-width: 860px;
    margin: 0 auto 2rem;
    display: flex;
    align-items: baseline;
    gap: 1rem;
    border-bottom: 2px solid var(--text);
    padding-bottom: 1rem;
  }

  header h1 {
    font-size: 1.8rem;
    font-weight: 800;
    letter-spacing: -0.03em;
  }

  header p {
    font-size: 0.8rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
  }

  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 1.4rem;
  }

  .card-title {
    font-size: 0.65rem;
    font-family: 'IBM Plex Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-bottom: 0.8rem;
  }

  .row {
    display: flex;
    gap: 1rem;
    align-items: flex-end;
    flex-wrap: wrap;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
    flex: 1;
  }

  .field label {
    font-size: 0.65rem;
    font-family: 'IBM Plex Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }

  .field input, .field select {
    background: var(--bg);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    padding: 0.6rem 0.8rem;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus, .field select:focus {
    border-color: var(--text);
  }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    font-size: 0.88rem;
    line-height: 1.7;
    padding: 0.9rem 1rem;
    border-radius: 8px;
    resize: vertical;
    min-height: 160px;
    outline: none;
    transition: border-color 0.15s;
  }

  textarea:focus { border-color: var(--text); }

  .optional-row {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .run-btn {
    background: var(--text);
    color: var(--bg);
    border: none;
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 0.9rem;
    padding: 0.75rem 2rem;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: opacity 0.15s, transform 0.1s;
    width: 100%;
    margin-top: 0.4rem;
  }

  .run-btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .run-btn:active { transform: translateY(0); }
  .run-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  /* Results */
  .results-card { display: none; }
  .results-card.visible { display: block; }

  .summary-row {
    display: flex;
    gap: 0.7rem;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.35rem 0.8rem;
    border-radius: 20px;
    font-size: 0.72rem;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    border: 1.5px solid;
  }

  .badge.red { background: var(--red-light); color: var(--red); border-color: #f5c6c2; }
  .badge.orange { background: var(--orange-light); color: var(--orange); border-color: #f5dcc2; }
  .badge.yellow { background: var(--yellow-light); color: var(--yellow); border-color: #f5eec2; }
  .badge.green { background: var(--green-light); color: var(--green); border-color: #c2f5d3; }

  .annotated-text {
    font-size: 0.9rem;
    line-height: 1.9;
    color: var(--text);
    background: var(--bg);
    border-radius: 8px;
    padding: 1.2rem;
    border: 1.5px solid var(--border);
    margin-bottom: 1.2rem;
  }

  mark {
    border-radius: 3px;
    padding: 1px 2px;
    cursor: pointer;
    transition: filter 0.1s;
    font-weight: 600;
  }
  mark:hover { filter: brightness(0.93); }
  mark.red { background: #fad7d4; color: var(--red); }
  mark.orange { background: #faddca; color: var(--orange); }
  mark.yellow { background: #faf3c4; color: var(--yellow); }

  .claims-list {
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
  }

  .claim-item {
    border-radius: 8px;
    padding: 1rem 1.1rem;
    border: 1.5px solid;
    display: flex;
    gap: 0.8rem;
  }

  .claim-item.red { background: var(--red-light); border-color: #f5c6c2; }
  .claim-item.orange { background: var(--orange-light); border-color: #f5dcc2; }
  .claim-item.yellow { background: var(--yellow-light); border-color: #f5eec2; }

  .claim-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }

  .claim-content {}
  .claim-quote {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    margin-bottom: 0.3rem;
    opacity: 0.7;
  }
  .claim-reason { font-size: 0.83rem; line-height: 1.55; }
  .claim-level {
    font-size: 0.62rem;
    font-family: 'IBM Plex Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    opacity: 0.6;
    margin-top: 0.3rem;
  }

  .clean-msg {
    text-align: center;
    padding: 2rem;
    color: var(--green);
    font-weight: 700;
    font-size: 1rem;
  }

  /* Spinner */
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(245,242,235,0.3);
    border-top-color: var(--bg);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 0.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .model-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 0.8rem;
  }

  .toggle-key {
    background: none;
    border: 1.5px solid var(--border);
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    padding: 0.35rem 0.75rem;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 0.8rem;
  }
  .toggle-key:hover { border-color: var(--text); color: var(--text); }
</style>
</head>
<body>

<header>
  <h1>🔍 Hallucination Spotter</h1>
  <p>Let AI fact-check AI</p>
</header>

<div class="container">

  <!-- Config -->
  <div class="card">
    <div class="card-title">Configuration</div>

    <button class="toggle-key" id="toggleKey">🔑 API Key</button>
    <div id="keyRow" style="display:none; margin-bottom:1rem;">
      <div class="field" style="max-width:380px;">
        <label>Anthropic API Key (used to run the checker)</label>
        <input type="password" id="apiKey" placeholder="sk-ant-..." />
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Checker Model</label>
        <select id="model">
          <option value="claude-sonnet-4-20250514">Claude Sonnet 4 (recommended)</option>
          <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5 (faster)</option>
        </select>
      </div>
      <div class="field">
        <label>Sensitivity</label>
        <select id="sensitivity">
          <option value="balanced">Balanced</option>
          <option value="strict">Strict — flag more things</option>
          <option value="lenient">Lenient — only obvious errors</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="card">
    <div class="card-title">Paste the AI response to check</div>
    <textarea id="responseText" placeholder="Paste here the text you want to fact-check. It can be any AI-generated response — a summary, an explanation, a research answer, etc."></textarea>

    <div style="margin-top:1rem;">
      <div class="card-title" style="margin-bottom:0.5rem;">Original question / context (optional)</div>
      <textarea id="contextText" style="min-height:70px;" placeholder="What was the original question or prompt that generated this response? (Helps the checker be more accurate)"></textarea>
    </div>

    <button class="run-btn" id="runBtn" onclick="runCheck()">🔍 Spot Hallucinations</button>
  </div>

  <!-- Results -->
  <div class="card results-card" id="resultsCard">
    <div class="card-title">Analysis Results</div>

    <div class="summary-row" id="summaryRow"></div>
    <div class="annotated-text" id="annotatedText"></div>
    <div class="claims-list" id="claimsList"></div>
    <div class="model-tag" id="modelTag"></div>
  </div>

</div>

<script>
document.getElementById('toggleKey').onclick = () => {
  const el = document.getElementById('keyRow');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
};

function buildPrompt(text, context, sensitivity) {
  const sensitivityNote = {
    strict: "Be thorough and flag anything that could potentially be wrong, even if uncertain.",
    balanced: "Flag claims that are likely false, unverifiable, or suspiciously specific without context.",
    lenient: "Only flag claims that are clearly or very likely incorrect."
  }[sensitivity];

  return `You are a hallucination detector for AI-generated text. Your job is to identify claims that may be false, fabricated, or unverifiable.

${context ? `Original question/context: "${context}"\n` : ''}
Text to analyze:
"""
${text}
"""

${sensitivityNote}

Analyze this text and identify problematic claims. For each one, classify it as:
- HIGH: Very likely false or fabricated (wrong facts, made-up names/dates/numbers)
- MEDIUM: Possibly wrong or misleading, needs verification
- LOW: Minor inaccuracy, vague, or unverifiable but plausible

Respond ONLY with a valid JSON object, no markdown, no explanation outside JSON:
{
  "overall": "clean" | "minor_issues" | "significant_issues" | "major_issues",
  "summary": "one sentence overall assessment",
  "claims": [
    {
      "quote": "exact short excerpt from the text (max 15 words)",
      "level": "HIGH" | "MEDIUM" | "LOW",
      "reason": "why this might be wrong or unverifiable"
    }
  ]
}

If no issues found, return: {"overall": "clean", "summary": "No hallucinations detected.", "claims": []}`;
}

async function runCheck() {
  const text = document.getElementById('responseText').value.trim();
  if (!text) { alert('Please paste a response to check.'); return; }

  const key = document.getElementById('apiKey').value.trim();
  if (!key) {
    document.getElementById('keyRow').style.display = 'block';
    alert('Please enter your Anthropic API key.'); return;
  }

  const model = document.getElementById('model').value;
  const sensitivity = document.getElementById('sensitivity').value;
  const context = document.getElementById('contextText').value.trim();

  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Analyzing...';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model,
        max_tokens: 1500,
        messages: [{ role: 'user', content: buildPrompt(text, context, sensitivity) }]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    let raw = data.content[0].text.trim();
    raw = raw.replace(/```json|```/g, '').trim();
    const result = JSON.parse(raw);

    renderResults(text, result, model);
  } catch (err) {
    alert('Error: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🔍 Spot Hallucinations';
  }
}

function renderResults(originalText, result, model) {
  const card = document.getElementById('resultsCard');
  card.classList.add('visible');
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });

  // Summary badges
  const summaryRow = document.getElementById('summaryRow');
  const counts = { HIGH: 0, MEDIUM: 0, LOW: 0 };
  (result.claims || []).forEach(c => counts[c.level]++);

  const overallMap = {
    clean: { cls: 'green', icon: '✅', label: 'Clean' },
    minor_issues: { cls: 'yellow', icon: '⚠️', label: 'Minor issues' },
    significant_issues: { cls: 'orange', icon: '🔶', label: 'Significant issues' },
    major_issues: { cls: 'red', icon: '🚨', label: 'Major issues' },
  };
  const ov = overallMap[result.overall] || overallMap.minor_issues;

  summaryRow.innerHTML = `
    <span class="badge ${ov.cls}">${ov.icon} ${ov.label}</span>
    ${counts.HIGH ? `<span class="badge red">🔴 ${counts.HIGH} High risk</span>` : ''}
    ${counts.MEDIUM ? `<span class="badge orange">🟠 ${counts.MEDIUM} Medium risk</span>` : ''}
    ${counts.LOW ? `<span class="badge yellow">🟡 ${counts.LOW} Low risk</span>` : ''}
    <span style="font-size:0.8rem; color:var(--muted); align-self:center; margin-left:0.3rem;">${result.summary}</span>
  `;

  // Annotated text
  const annotated = document.getElementById('annotatedText');
  if (!result.claims || result.claims.length === 0) {
    annotated.innerHTML = `<div class="clean-msg">✅ No hallucinations detected in this text.</div>`;
  } else {
    let html = escapeHtml(originalText);
    // Sort by length desc to avoid nested replacements
    const sorted = [...result.claims].sort((a, b) => b.quote.length - a.quote.length);
    sorted.forEach((claim, i) => {
      const cls = claim.level === 'HIGH' ? 'red' : claim.level === 'MEDIUM' ? 'orange' : 'yellow';
      const escaped = escapeHtml(claim.quote);
      if (html.includes(escaped)) {
        html = html.replace(escaped, `<mark class="${cls}" title="${escapeHtml(claim.reason)}">${escaped}</mark>`);
      }
    });
    annotated.innerHTML = html.replace(/\n/g, '<br>');
  }

  // Claims list
  const claimsList = document.getElementById('claimsList');
  if (!result.claims || result.claims.length === 0) {
    claimsList.innerHTML = '';
  } else {
    const icons = { HIGH: '🔴', MEDIUM: '🟠', LOW: '🟡' };
    const cls = { HIGH: 'red', MEDIUM: 'orange', LOW: 'yellow' };
    claimsList.innerHTML = result.claims.map(c => `
      <div class="claim-item ${cls[c.level]}">
        <div class="claim-icon">${icons[c.level]}</div>
        <div class="claim-content">
          <div class="claim-quote">"${c.quote}"</div>
          <div class="claim-reason">${c.reason}</div>
          <div class="claim-level">${c.level} risk</div>
        </div>
      </div>
    `).join('');
  }

  document.getElementById('modelTag').textContent = `Checked by ${model}`;
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
